# =============================================================================
# Main K8s deploy: build image, deploy to K8s, load test, post summary.
# =============================================================================
name: K8 Deploy

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag (leave empty to build from ref)'
        required: false
        type: string
      ref:
        description: 'Git ref to build from'
        required: false
        type: string
        default: 'main'
  workflow_call:
    inputs:
      ref:
        description: 'Git ref to build from'
        required: false
        type: string
        default: 'main'

concurrency:
  group: deploy-k8-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write
  pull-requests: write

env:
  IMAGE_NAME: ghcr.io/sutracodehq-ui/education-system-management
  K8_DOMAIN: https://ems.sutracode.in

jobs:
  build:
    name: Build image
    uses: ./.github/workflows/build-image.yml
    with:
      tag_type: sha
      push: true
      ref: ${{ inputs.ref || github.ref }}
    secrets: inherit

  deploy:
    name: Deploy to K8s
    needs: build
    uses: ./.github/workflows/deploy-k8.yml
    with:
      image_tag: ${{ needs.build.outputs.image_tag }}
    secrets: inherit

  load-test:
    name: Load test
    needs: deploy
    uses: ./.github/workflows/load-test.yml
    with:
      target_url: https://ems.sutracode.in
    secrets: inherit

  post-deploy-summary:
    name: Deploy summary
    needs: [build, deploy, load-test]
    runs-on: ubuntu-latest
    if: always() && !cancelled() && (needs.build.result == 'success' && needs.deploy.result == 'success')
    steps:
      - name: Health check
        id: health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ env.K8_DOMAIN }}" || echo "000")
          echo "status=${STATUS}" >> $GITHUB_OUTPUT
          if [[ "$STATUS" == "200" ]]; then
            echo "label=✅ 200 OK" >> $GITHUB_OUTPUT
          else
            echo "label=❌ ${STATUS}" >> $GITHUB_OUTPUT
          fi

      - name: Write job summary
        run: |
          echo "### Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Health | ${{ steps.health.outputs.label }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Domain | ${{ env.K8_DOMAIN }} |" >> $GITHUB_STEP_SUMMARY

      - name: Comment on commit or PR
        uses: actions/github-script@v7
        with:
          script: |
            const body = `### Deploy Summary (K8s)\n| Item | Value |\n|------|-------|\n| Image | \`${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image_tag }}\` |\n| Health | ${{ steps.health.outputs.label }} |\n| Domain | ${{ env.K8_DOMAIN }} |`;
            if (context.payload.pull_request) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            } else {
              await github.rest.repos.createCommitComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: context.sha,
                body
              });
            }
