# =============================================================================
# Main VPS deploy: parse tag → test → build → deploy → load test → summary.
# Triggers on:
#   - Tag push: v-{institution}-{version} (e.g. v-rishividya-1.2.0)
#   - Manual dispatch
#   - Reusable workflow call
# =============================================================================
name: VPS Deploy

on:
  # push:
  #   tags:
  #     - 'v-*-*.*.*'   # DISABLED — deployments are done manually via ems.sh
  workflow_dispatch:
    inputs:
      institution_id:
        description: 'Institution ID'
        required: true
        type: string
      version:
        description: 'Version (e.g. 1.0.0); optional, uses institution-latest if empty'
        required: false
        type: string
      ref:
        description: 'Git ref to build from'
        required: false
        type: string
        default: 'main'
  workflow_call:
    inputs:
      institution_id:
        description: 'Institution ID'
        required: true
        type: string
      version:
        description: 'Version (e.g. 1.0.0); optional'
        required: false
        type: string
      ref:
        description: 'Git ref to build from'
        required: false
        type: string
        default: 'main'

concurrency:
  group: deploy-vps-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write
  pull-requests: write

env:
  IMAGE_NAME: ghcr.io/sutracodehq-ui/education-system-management

jobs:
  # ── Parse tag or use manual inputs ─────────────────────────────────────
  resolve:
    name: Resolve inputs
    runs-on: ubuntu-latest
    outputs:
      institution_id: ${{ steps.resolve.outputs.institution_id }}
      version: ${{ steps.resolve.outputs.version }}
      domain: ${{ steps.resolve.outputs.domain }}
      ref: ${{ steps.resolve.outputs.ref }}
    steps:
      - uses: actions/checkout@v4
      - id: resolve
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            # Parse tag: v-rishividya-1.2.0 → institution=rishividya, version=1.2.0
            TAG="${GITHUB_REF#refs/tags/v-}"
            INSTITUTION="${TAG%%-[0-9]*}"
            VERSION="${TAG#${INSTITUTION}-}"
            REF="${GITHUB_REF}"
          else
            # Manual/reusable: use inputs
            INSTITUTION="${{ inputs.institution_id }}"
            VERSION="${{ inputs.version }}"
            REF="${{ inputs.ref || github.ref }}"
          fi

          # Validate institution exists in registry
          if ! jq -e --arg id "${INSTITUTION}" '.institutions[$id]' .github/institution-registry.json > /dev/null 2>&1; then
            echo "::error::Institution '${INSTITUTION}' not found in .github/institution-registry.json"
            exit 1
          fi

          DOMAIN=$(jq -r --arg id "${INSTITUTION}" '.institutions[$id].domain // empty' .github/institution-registry.json)

          echo "institution_id=${INSTITUTION}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "domain=${DOMAIN:-unknown}" >> $GITHUB_OUTPUT
          echo "ref=${REF}" >> $GITHUB_OUTPUT

          echo "### Resolved Deploy Inputs" >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Institution | \`${INSTITUTION}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`${VERSION}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Domain | ${DOMAIN} |" >> $GITHUB_STEP_SUMMARY
          echo "| Ref | \`${REF}\` |" >> $GITHUB_STEP_SUMMARY

  # test:
  #   name: Test
  #   uses: ./.github/workflows/unit-test.yml
  #   NOTE: Skipped — actual tests are commented out in unit-test.yml.
  #         Uncomment when tests are enabled to avoid wasting ~4 min per deploy.

  build:
    name: Build image
    needs: [resolve]      # no test dependency — tests are disabled
    uses: ./.github/workflows/build-image.yml
    with:
      tag_type: institution
      institution_id: ${{ needs.resolve.outputs.institution_id }}
      version: ${{ needs.resolve.outputs.version }}
      push: true
      ref: ${{ needs.resolve.outputs.ref }}
    secrets: inherit

  # Deploy is done locally via ems.sh (not via GitHub Actions SSH).
  # Use: ./infra/podman/scripts/ems.sh → option 5 (Deploy App)
  # The deploy-vps.yml workflow is still available for manual use via workflow_dispatch.

  build-summary:
    name: Build summary
    needs: [build, resolve]
    runs-on: ubuntu-latest
    if: always() && !cancelled() && needs.build.result == 'success'
    steps:
      - name: Write summary
        run: |
          echo "### Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Institution | \`${{ needs.resolve.outputs.institution_id }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Skipped | ${{ needs.build.outputs.skipped }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Deploy locally:**" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "./infra/podman/scripts/ems.sh  # option 5" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY