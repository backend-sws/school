# =============================================================================
# Build and push Horizon Docker image.
#
# Triggered by:
#   1. Git tags matching `horizon-v*` (versioned releases)
#   2. CI/CD pipeline on push to pds (latest tag)
#   3. Manual dispatch
#
# Usage (versioned):
#   git tag horizon-v1.0.0 && git push origin horizon-v1.0.0
#
# Registry: ghcr.io/sutracodehq-ui/education-system-management-horizon
# =============================================================================
name: Build Horizon Image

on:
  push:
    tags:
      - 'horizon-v*'      # e.g. horizon-v1.0.0, horizon-v1.0.1
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (e.g. 1.0.0). If empty, extracted from tag.'
        required: false
        type: string
      push:
        description: 'Push to GHCR'
        required: false
        type: boolean
        default: true
  workflow_call:
    inputs:
      version:
        description: 'Version override (e.g. 1.0.0). If empty, uses latest.'
        required: false
        type: string
      push:
        description: 'Push to GHCR'
        required: false
        type: boolean
        default: true

env:
  IMAGE_NAME: ghcr.io/sutracodehq-ux/pds-education-horizon

jobs:
  build:
    name: Build Horizon image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.resolve.outputs.image_tag }}

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tags
        id: resolve
        run: |
          IMAGE="${{ env.IMAGE_NAME }}"
          SHA_SHORT="${GITHUB_SHA::7}"
          REF="${{ github.ref }}"

          # Extract version from tag (horizon-v1.0.0 → 1.0.0)
          if [[ "$REF" == refs/tags/horizon-v* ]]; then
            VERSION="${REF#refs/tags/horizon-v}"
          elif [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="dev-${SHA_SHORT}"
          fi

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "image_tag=v${VERSION}" >> $GITHUB_OUTPUT

          # Tags: versioned + latest + sha
          TAGS="${IMAGE}:v${VERSION}"
          TAGS="${TAGS}"$'\n'"${IMAGE}:latest"
          TAGS="${TAGS}"$'\n'"${IMAGE}:sha-${SHA_SHORT}"

          echo "tags<<EOF" >> $GITHUB_OUTPUT
          echo "$TAGS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "Resolved version: ${VERSION}"
          echo "Tags:"
          echo "$TAGS"

      - name: Login to GHCR (with retry)
        env:
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin; then
              echo "Logged into GHCR on attempt ${attempt}"
              exit 0
            fi

            if [[ "$attempt" -lt 3 ]]; then
              wait_time=$((attempt * 10))
              echo "GHCR login failed on attempt ${attempt}; retrying in ${wait_time}s..."
              sleep "$wait_time"
            fi
          done

          echo "GHCR login failed after 3 attempts."
          exit 1

      - name: Check if image exists
        id: check
        run: |
          TAG="${{ env.IMAGE_NAME }}:${{ steps.resolve.outputs.image_tag }}"
          if docker manifest inspect "$TAG" > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Image $TAG already exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Docker Buildx
        if: steps.check.outputs.exists == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        if: steps.check.outputs.exists == 'false'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.horizon
          push: ${{ inputs.push == '' || inputs.push == true }}
          tags: ${{ steps.resolve.outputs.tags }}
          build-args: |
            VERSION=${{ steps.resolve.outputs.version }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}
          cache-from: type=gha,scope=horizon
          cache-to: type=gha,scope=horizon,mode=max

      - name: Skip (image exists)
        if: steps.check.outputs.exists == 'true'
        run: |
          echo "### ⏭️ Build Skipped" >> $GITHUB_STEP_SUMMARY
          echo "Image \`${{ steps.resolve.outputs.image_tag }}\` already exists in GHCR" >> $GITHUB_STEP_SUMMARY

      - name: Summary
        if: steps.check.outputs.exists == 'false'
        run: |
          echo "### ✅ Horizon Image Built" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${{ steps.resolve.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.resolve.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Use in podman-compose:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "HORIZON_IMAGE_TAG=${{ steps.resolve.outputs.image_tag }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Logout GHCR
        if: always()
        run: docker logout ghcr.io || true
