# =============================================================================
# Load test (k6). Runs on merge to main and after VPS deploy; also callable.
# =============================================================================
name: Load Test

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Base URL to load test'
        required: false
        default: 'https://ems.sutracode.in'
  workflow_call:
    inputs:
      target_url:
        description: 'Base URL to load test'
        required: false
        type: string
        default: 'https://ems.sutracode.in'

jobs:
  load-test:
    name: k6 load test
    runs-on: ubuntu-latest
    env:
      TARGET_URL: ${{ inputs.target_url || 'https://ems.sutracode.in' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install k6
        run: |
          curl -fsSL https://github.com/grafana/k6/releases/download/v0.54.0/k6-v0.54.0-linux-amd64.tar.gz | tar xzf - --strip-components=1
          sudo mv k6 /usr/local/bin/
          k6 version

      - name: Run k6
        run: k6 run --env TARGET_URL="${{ env.TARGET_URL }}" .github/scripts/k6-load.js
