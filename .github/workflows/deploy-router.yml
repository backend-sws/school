# =============================================================================
# Router: on tag push or manual trigger, deploy to VPS (institution tag) or K8s (other).
# Tag v-<institution_id>-<version> -> VPS; other v* (e.g. semver) -> K8s.
# =============================================================================
name: Deploy Router

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to deploy (e.g. v-ptjmrajgir-1.0.0 or v1.0.0)'
        required: false
        type: string
      target:
        description: 'Target (vps or k8); if not set, inferred from tag pattern'
        required: false
        type: choice
        options: [vps, k8]
        default: ''

concurrency:
  group: deploy-router-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write
  pull-requests: write

jobs:
  decide:
    name: Decide target
    runs-on: ubuntu-latest
    outputs:
      target: ${{ steps.out.outputs.target }}
      institution_id: ${{ steps.out.outputs.institution_id }}
      version: ${{ steps.out.outputs.version }}
      ref: ${{ steps.out.outputs.ref }}
    steps:
      - id: out
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            MANUAL_TARGET="${{ inputs.target }}"
            TAG_INPUT="${{ inputs.tag }}"
            if [[ -n "$TAG_INPUT" ]]; then
              REF="refs/tags/${TAG_INPUT}"
              echo "ref=${TAG_INPUT}" >> $GITHUB_OUTPUT
            else
              REF="${{ github.ref }}"
              echo "ref=${{ github.ref }}" >> $GITHUB_OUTPUT
            fi
          else
            MANUAL_TARGET=""
            REF="${{ github.ref }}"
            echo "ref=${{ github.ref }}" >> $GITHUB_OUTPUT
          fi

          if [[ -n "$MANUAL_TARGET" ]]; then
            echo "target=${MANUAL_TARGET}" >> $GITHUB_OUTPUT
            if [[ "$MANUAL_TARGET" == "vps" ]]; then
              if [[ "$REF" == refs/tags/v-*-* ]]; then
                BODY="${REF#refs/tags/v-}"
                echo "institution_id=${BODY%-*}" >> $GITHUB_OUTPUT
                echo "version=${BODY##*-}" >> $GITHUB_OUTPUT
              fi
            fi
            exit 0
          fi

          if [[ "$REF" != refs/tags/v* ]]; then
            echo "target=" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [[ "$REF" == refs/tags/v-*-* ]]; then
            echo "target=vps" >> $GITHUB_OUTPUT
            TAG_NAME="${REF#refs/tags/}"
            BODY="${TAG_NAME#v-}"
            echo "institution_id=${BODY%-*}" >> $GITHUB_OUTPUT
            echo "version=${BODY##*-}" >> $GITHUB_OUTPUT
          else
            echo "target=k8" >> $GITHUB_OUTPUT
          fi

  vps-deploy:
    name: Deploy to VPS
    needs: decide
    if: needs.decide.outputs.target == 'vps'
    uses: ./.github/workflows/vps-deploy.yml
    with:
      institution_id: ${{ needs.decide.outputs.institution_id }}
      version: ${{ needs.decide.outputs.version }}
      ref: ${{ needs.decide.outputs.ref }}
    secrets: inherit

  k8-deploy:
    name: Deploy to K8s
    needs: decide
    if: needs.decide.outputs.target == 'k8'
    uses: ./.github/workflows/k8-deploy.yml
    with:
      ref: ${{ needs.decide.outputs.ref }}
    secrets: inherit
