# =============================================================================
# Deploy to Kubernetes (Linode). Reusable; expects image already built & pushed.
# =============================================================================
name: Deploy K8s

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy'
        required: true
        type: string
        default: 'latest'
  workflow_call:
    inputs:
      image_tag:
        description: 'Image tag to deploy'
        required: true
        type: string

env:
  IMAGE_NAME: ghcr.io/sutracodehq-ui/education-system-management

jobs:
  deploy:
    name: Deploy to K8s
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Safe migration job name
        id: safe
        run: echo "suffix=$(echo '${{ inputs.image_tag }}' | tr '.' '-')-${{ github.run_id }}" >> $GITHUB_OUTPUT

      - name: Set K8s context
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Prepare manifests
        run: cp infra/k8s/base-manifest/platform.yml platform-processed.yml

      - name: Rollout deployment
        run: |
          echo "Applying platform manifests..."
          kubectl apply -f platform-processed.yml
          echo "Updating image to ${{ env.IMAGE_NAME }}:${{ inputs.image_tag }}"
          kubectl set image deployment/ems-app ems-app=${{ env.IMAGE_NAME }}:${{ inputs.image_tag }} -n education-management
          kubectl rollout restart deployment/ems-app -n education-management
          kubectl rollout status deployment/ems-app -n education-management --timeout=300s

      - name: Run DB migrations
        run: |
          cat <<EOF > migration-job.yml
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: cms-migrate-${{ steps.safe.outputs.suffix }}
            namespace: education-management
          spec:
            ttlSecondsAfterFinished: 300
            template:
              metadata:
                annotations:
                  sidecar.istio.io/inject: "false"
              spec:
                imagePullSecrets:
                  - name: ghcr-secret
                containers:
                - name: migrate
                  image: ${{ env.IMAGE_NAME }}:${{ inputs.image_tag }}
                  command: ["/bin/sh", "/usr/local/bin/entrypoint.sh"]
                  args: ["php", "artisan", "migrate", "--seed", "--force"]
                  envFrom:
                  - configMapRef:
                      name: ems-app-config
                  - secretRef:
                      name: ems-app-secret
                restartPolicy: Never
            backoffLimit: 0
          EOF
          kubectl apply -f migration-job.yml
          if ! kubectl wait --for=condition=complete job/cms-migrate-${{ steps.safe.outputs.suffix }} -n education-management --timeout=600s; then
            kubectl logs -n education-management -l job-name=cms-migrate-${{ steps.safe.outputs.suffix }} --all-containers=true
            kubectl delete -f migration-job.yml
            exit 1
          fi
          kubectl delete -f migration-job.yml
