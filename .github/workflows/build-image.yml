# =============================================================================
# Build and optionally push Docker image.
# - Always creates: latest + sha-* tags
# - Institution builds: additionally adds institution-vX.Y.Z + institution-latest
# - Skips rebuild if same codebase (sha-*) already exists in GHCR
# =============================================================================
name: Build Image

on:
  workflow_dispatch:
    inputs:
      tag_type:
        description: 'Tag type'
        required: true
        type: choice
        options: [latest, sha, institution]
        default: sha
      institution_id:
        description: 'Institution ID (required if tag_type=institution)'
        required: false
        type: string
      version:
        description: 'Version for institution tag (e.g. 1.0.0); optional, from ref if tag'
        required: false
        type: string
      push:
        description: 'Push to GHCR'
        required: false
        type: boolean
        default: true
      force_build:
        description: 'Force rebuild even if image exists'
        required: false
        type: boolean
        default: false
  workflow_call:
    inputs:
      tag_type:
        description: 'Tag type: latest, sha, institution'
        required: true
        type: string
      institution_id:
        description: 'Institution ID (for tag_type=institution)'
        required: false
        type: string
      version:
        description: 'Version for institution (e.g. 1.0.0)'
        required: false
        type: string
      push:
        description: 'Push image to registry'
        required: false
        type: boolean
        default: true
      ref:
        description: 'Git ref to build (branch or tag)'
        required: false
        type: string
      force_build:
        description: 'Force rebuild even if image exists'
        required: false
        type: boolean
        default: false
    outputs:
      image_tag:
        value: ${{ jobs.build.outputs.image_tag }}
      skipped:
        value: ${{ jobs.build.outputs.skipped }}

env:
  IMAGE_NAME: ghcr.io/sutracodehq-ux/pds-education

jobs:
  build:
    name: Build image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.resolve.outputs.image_tag }}
      skipped: ${{ steps.check.outputs.skip_build }}

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Resolve image tags
        id: resolve
        run: |
          TAG_TYPE="${{ inputs.tag_type }}"
          INSTITUTION_ID="${{ inputs.institution_id }}"
          VERSION="${{ inputs.version }}"
          REF="${{ github.ref }}"
          IMAGE="${{ env.IMAGE_NAME }}"
          SHA_SHORT="${GITHUB_SHA::7}"

          # Output sha tag for checking if codebase exists
          echo "sha_tag=sha-${SHA_SHORT}" >> $GITHUB_OUTPUT

          # Always include: latest + sha-*
          TAGS="${IMAGE}:latest"
          TAGS="${TAGS}"$'\n'"${IMAGE}:sha-${SHA_SHORT}"

          if [[ "$TAG_TYPE" == "latest" ]]; then
            echo "image_tag=latest" >> $GITHUB_OUTPUT
          elif [[ "$TAG_TYPE" == "sha" ]]; then
            echo "image_tag=sha-${SHA_SHORT}" >> $GITHUB_OUTPUT
          elif [[ "$TAG_TYPE" == "institution" ]]; then
            # Additionally add institution-specific tags
            if [[ -z "$INSTITUTION_ID" ]]; then
              echo "institution_id required when tag_type=institution"
              exit 1
            fi
            if [[ -z "$VERSION" ]]; then
              if [[ "$REF" == refs/tags/v-*-* ]]; then
                TAG_NAME="${REF#refs/tags/}"
                BODY="${TAG_NAME#v-}"
                VERSION="${BODY##*-}"
              else
                VERSION="latest"
              fi
            fi
            if [[ "$VERSION" == "latest" ]]; then
              TAGS="${TAGS}"$'\n'"${IMAGE}:${INSTITUTION_ID}-latest"
              echo "image_tag=${INSTITUTION_ID}-latest" >> $GITHUB_OUTPUT
            else
              TAGS="${TAGS}"$'\n'"${IMAGE}:${INSTITUTION_ID}-v${VERSION}"
              TAGS="${TAGS}"$'\n'"${IMAGE}:${INSTITUTION_ID}-latest"
              echo "image_tag=${INSTITUTION_ID}-v${VERSION}" >> $GITHUB_OUTPUT
            fi
          else
            echo "Unknown tag_type: $TAG_TYPE"
            exit 1
          fi

          # Output tags (use EOF for multiline)
          echo "tags<<EOF" >> $GITHUB_OUTPUT
          echo "$TAGS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "Generated tags:"
          echo "$TAGS"

      - name: Validate institution in registry
        if: inputs.tag_type == 'institution'
        run: |
          if ! jq -e --arg id "${{ inputs.institution_id }}" '.institutions[$id]' .github/institution-registry.json > /dev/null; then
            echo "Institution '${{ inputs.institution_id }}' not in .github/institution-registry.json"
            exit 1
          fi

      - name: Login to GHCR (with retry)
        env:
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin; then
              echo "Logged into GHCR on attempt ${attempt}"
              exit 0
            fi

            if [[ "$attempt" -lt 3 ]]; then
              wait_time=$((attempt * 10))
              echo "GHCR login failed on attempt ${attempt}; retrying in ${wait_time}s..."
              sleep "$wait_time"
            fi
          done

          echo "GHCR login failed after 3 attempts."
          exit 1

      - name: Check if codebase image exists
        id: check
        run: |
          SHA_IMAGE="${{ env.IMAGE_NAME }}:${{ steps.resolve.outputs.sha_tag }}"
          echo "Checking if codebase image $SHA_IMAGE exists..."
          if docker manifest inspect "$SHA_IMAGE" > /dev/null 2>&1; then
            echo "Codebase image exists - will skip build and add tags"
            echo "sha_exists=true" >> $GITHUB_OUTPUT
            echo "skip_build=true" >> $GITHUB_OUTPUT
          else
            echo "Codebase image does not exist - will build"
            echo "sha_exists=false" >> $GITHUB_OUTPUT
            echo "skip_build=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Docker Buildx
        if: steps.check.outputs.skip_build == 'false' || inputs.force_build == true
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        if: steps.check.outputs.skip_build == 'false' || inputs.force_build == true
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.prod
          push: ${{ inputs.push != '' && inputs.push || true }}
          tags: ${{ steps.resolve.outputs.tags }}
          build-args: |
            VERSION=${{ steps.resolve.outputs.image_tag }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Add tags to existing image (skip build)
        if: steps.check.outputs.skip_build == 'true' && inputs.force_build != true
        run: |
          echo "Codebase already exists, adding new tags only (preserving existing)..."
          SOURCE="${{ env.IMAGE_NAME }}:${{ steps.resolve.outputs.sha_tag }}"
          echo "Source image: $SOURCE"
          
          ADDED_TAGS=""
          SKIPPED_TAGS=""
          
          # Only add tags that don't already exist (preserve existing tags)
          echo "${{ steps.resolve.outputs.tags }}" | while read -r TAG; do
            if [[ -n "$TAG" && "$TAG" != "$SOURCE" ]]; then
              # Check if this tag already exists
              if docker manifest inspect "$TAG" > /dev/null 2>&1; then
                echo "Tag already exists, skipping: $TAG"
                SKIPPED_TAGS="${SKIPPED_TAGS}${TAG}\n"
              else
                echo "Adding new tag: $TAG"
                docker buildx imagetools create -t "$TAG" "$SOURCE"
                ADDED_TAGS="${ADDED_TAGS}${TAG}\n"
              fi
            fi
          done

      - name: Build summary
        if: inputs.push != 'false'
        run: |
          if [[ "${{ steps.check.outputs.skip_build }}" == "true" && "${{ inputs.force_build }}" != "true" ]]; then
            echo "### Build skipped (codebase exists)" >> $GITHUB_STEP_SUMMARY
            echo "Used existing image \`${{ env.IMAGE_NAME }}:${{ steps.resolve.outputs.sha_tag }}\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "New tags were added only if they didn't already exist (existing tags preserved)." >> $GITHUB_STEP_SUMMARY
          else
            echo "### Image built and pushed" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Requested tags:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.resolve.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Logout GHCR
        if: always()
        run: docker logout ghcr.io || true
