apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: education-management-tls
  namespace: education-management
spec:
  secretName: education-management-tls
  issuerRef:
    name: letsencrypt-education-management
    kind: ClusterIssuer
  dnsNames:
    - ems.sutracode.in
  duration: 2160h # 90 days
  renewBefore: 360h # 15 days
