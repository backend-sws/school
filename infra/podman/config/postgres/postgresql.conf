# =============================================================================
# PostgreSQL 15 Production Configuration (shared instance, all institutes)
# Tuned for: 512MB container memory limit, SSD storage
#
# SECURITY: Hardened - scram-sha-256 auth, logging, connection limits
# =============================================================================

# --- Connection & Authentication ---
listen_addresses = '*'
# ^ '*' is safe: pg_hba.conf + container port binding (127.0.0.1 only) block outside access
port = 5432
max_connections = 100
# Force strongest password hashing (no md5)
password_encryption = scram-sha-256
# Use our locked-down pg_hba.conf
hba_file = '/etc/postgresql/pg_hba.conf'

# --- Timeouts (prevent hanging connections) ---
idle_in_transaction_session_timeout = '5min'
statement_timeout = '60s'
tcp_keepalives_idle = 60
tcp_keepalives_interval = 10
tcp_keepalives_count = 6

# --- Memory (tuned for 512MB container) ---
shared_buffers = 128MB
effective_cache_size = 384MB
maintenance_work_mem = 64MB
work_mem = 4MB
wal_buffers = 8MB

# --- WAL / Checkpoints ---
checkpoint_completion_target = 0.9
min_wal_size = 128MB
max_wal_size = 512MB

# --- Planner ---
random_page_cost = 1.1
effective_io_concurrency = 200

# --- Logging (audit trail) ---
log_min_duration_statement = 500
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on
log_statement = 'ddl'
# ^ Logs all DDL (CREATE, ALTER, DROP) for audit
log_line_prefix = '%m [%p] %u@%d '

# --- Statistics ---
track_activities = on
track_counts = on
track_io_timing = on
