# =============================================================================
# PostgreSQL Host-Based Authentication (pg_hba.conf)
# SECURITY: NO outside connections allowed. Container network ONLY.
#
# Rules are evaluated top-to-bottom, first match wins.
# =============================================================================

# TYPE    DATABASE        USER            ADDRESS                 METHOD

# --- Local connections (inside the container) ---
# postgres superuser can connect locally (for backups, maintenance)
local     all             postgres                                peer
# App user can connect locally too
local     all             all                                     scram-sha-256

# --- Loopback (127.0.0.1 inside container, used by pg_isready healthcheck) ---
host      all             postgres        127.0.0.1/32            scram-sha-256
host      all             all             127.0.0.1/32            scram-sha-256
host      all             all             ::1/128                 scram-sha-256

# --- Podman bridge network (172.16.0.0/12 covers default Podman subnets) ---
# Only the app user can connect from PgBouncer/app containers
# postgres superuser CANNOT connect remotely
host      all             all             10.0.0.0/8              scram-sha-256
host      all             all             172.16.0.0/12           scram-sha-256
host      all             all             192.168.0.0/16          scram-sha-256

# --- DENY EVERYTHING ELSE ---
# Any connection not matching above is rejected
host      all             all             0.0.0.0/0               reject
host      all             all             ::/0                    reject
