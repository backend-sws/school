; =============================================================================
; PgBouncer config — Shared instance for all EMS institutes.
; Each institute gets its own database entry below.
;
; This file is dynamically updated by add-college-from-local.sh
; when a new institute is added. Do NOT edit manually on VPS.
; =============================================================================

[databases]
; Institute databases — auto-managed by add-college script
; Format: <db_name> = host=postgres-ems port=5432 dbname=<db_name>
; NEW_DATABASE_ENTRY_HERE (do not remove this marker)

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt

pool_mode = transaction
max_client_conn = 2000
default_pool_size = 50
min_pool_size = 10
reserve_pool_size = 10
reserve_pool_timeout = 5

server_connect_timeout = 15
server_idle_timeout = 600
server_lifetime = 3600
client_idle_timeout = 0
client_login_timeout = 60
query_timeout = 300
query_wait_timeout = 120

log_connections = 1
log_disconnections = 1
log_pooler_errors = 1
stats_period = 60
admin_users = postgres
ignore_startup_parameters = extra_float_digits
server_reset_query = DISCARD ALL
max_prepared_statements = 100
