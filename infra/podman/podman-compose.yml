# =============================================================================
# Shared Services — Monitoring, DB, Cache
# These run once per VPS, shared across all institutes.
#
# DB:   postgres-ems (all institute databases)
#       pgbouncer-ems (connection pooling for all DBs)
# Cache: redis-ems (shared cache + queue, isolated by REDIS_PREFIX)
# Monitoring: cadvisor, prometheus, alertmanager, grafana, adminer
#
# Run: podman-compose -f podman-compose.yml up -d
# =============================================================================

services:
  # ── PostgreSQL (Shared) ────────────────────────────────────────────────────
  postgres-ems:
    image: docker.io/library/postgres:15
    container_name: postgres-ems
    restart: always
    ports:
      - "127.0.0.1:5432:5432"
    env_file: ./.db-secret
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_INITDB_ARGS=--auth-host=scram-sha-256 --auth-local=peer
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - /opt/ems/data/shared/postgres:/var/lib/postgresql/data
      - /opt/ems/config/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - /opt/ems/config/postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ems-network
    labels:
      - "service=postgres"

  # ── PgBouncer (Shared) ─────────────────────────────────────────────────────
  pgbouncer-ems:
    image: docker.io/edoburu/pgbouncer:v1.23.1-p3
    container_name: pgbouncer-ems
    restart: always
    ports:
      - "127.0.0.1:6432:6432"
    volumes:
      - /opt/ems/config/pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - /opt/ems/config/pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      postgres-ems:
        condition: service_healthy
    networks:
      - ems-network
    labels:
      - "service=pgbouncer"

  # ── Redis (Shared) ─────────────────────────────────────────────────────────
  redis-ems:
    image: docker.io/library/redis:7-alpine
    container_name: redis-ems
    restart: always
    volumes:
      - /opt/ems/data/shared/redis:/data
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --save 300 100
      --appendonly yes
      --appendfsync everysec
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - ems-network
    labels:
      - "service=redis"

  # ── cAdvisor ────────────────────────────────────────────────────────────────
  ems-cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.2
    container_name: ems-cadvisor
    restart: always
    ports:
      - "127.0.0.1:8888:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/containers:/var/lib/containers:ro
      - /run/user/1000/podman/podman.sock:/var/run/docker.sock:ro
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "128M"
    networks:
      - ems-network

  # ── Prometheus ──────────────────────────────────────────────────────────────
  ems-prometheus:
    image: docker.io/prom/prometheus:v2.48.0
    container_name: ems-prometheus
    restart: always
    ports:
      - "127.0.0.1:9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--storage.tsdb.retention.size=5GB'
      - '--web.external-url=/prometheus'
      - '--web.route-prefix=/prometheus'
    volumes:
      - /opt/ems/monitoring/prometheus:/etc/prometheus:ro
      - /opt/ems/data/prometheus:/prometheus
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: "256M"
        reservations:
          cpus: "0.05"
          memory: "128M"
    networks:
      - ems-network

  # ── Alertmanager ────────────────────────────────────────────────────────────
  ems-alertmanager:
    image: docker.io/prom/alertmanager:v0.26.0
    container_name: ems-alertmanager
    restart: always
    ports:
      - "127.0.0.1:9093:9093"
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    volumes:
      - /opt/ems/monitoring/alertmanager:/etc/alertmanager:ro
      - /opt/ems/data/alertmanager:/alertmanager
    deploy:
      resources:
        limits:
          cpus: "0.05"
          memory: "64M"
    networks:
      - ems-network

  # ── Grafana ─────────────────────────────────────────────────────────────────
  ems-grafana:
    image: docker.io/grafana/grafana:10.2.0
    container_name: ems-grafana
    restart: always
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - GF_SERVER_SERVE_FROM_SUB_PATH=false
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-changeme}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - /opt/ems/monitoring/grafana/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
      - /opt/ems/monitoring/grafana/dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml:ro
      - /opt/ems/monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
      - /opt/ems/data/grafana:/var/lib/grafana
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "128M"
        reservations:
          cpus: "0.025"
          memory: "64M"
    networks:
      - ems-network

  # ── Adminer ─────────────────────────────────────────────────────────────────
  ems-adminer:
    image: docker.io/adminer:latest
    container_name: ems-adminer
    restart: always
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=pgbouncer-ems
      - ADMINER_DESIGN=pepa-linha
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "128M"
    networks:
      - ems-network
    labels:
      - "service=adminer"

networks:
  ems-network:
    name: ems-network
    driver: bridge
