groups:
  - name: ems-postgres-alerts
    rules:
      # Per-college Postgres container down
      - alert: PostgresContainerDown
        expr: absent(container_last_seen{name=~"postgres-.*"})
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Postgres container {{ $labels.name }} is down"
          description: "A college's PostgreSQL container has been down for 1 minute"

      # Per-college Postgres high CPU (each Postgres has 0.40 CPU limit)
      - alert: PostgresHighCPU
        expr: rate(container_cpu_usage_seconds_total{name=~"postgres-.*"}[5m]) > 0.32
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU on {{ $labels.name }}"
          description: "Postgres container {{ $labels.name }} CPU > 80% of 0.4 core limit"

      # Per-college Postgres high memory (512M limit)
      - alert: PostgresHighMemory
        expr: container_memory_usage_bytes{name=~"postgres-.*"} > 430000000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory on {{ $labels.name }}"
          description: "Postgres container {{ $labels.name }} memory > 80% of 512M limit"

  - name: ems-container-alerts
    rules:
      # App container CPU (0.50 core limit)
      - alert: AppContainerHighCPU
        expr: rate(container_cpu_usage_seconds_total{name=~"ems-app-.*"}[5m]) > 0.4
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU on {{ $labels.name }}"
          description: "App container {{ $labels.name }} CPU > 80% of 0.5 core limit"

      # App container memory (512M limit)
      - alert: AppContainerHighMemory
        expr: container_memory_usage_bytes{name=~"ems-app-.*"} > 430000000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory on {{ $labels.name }}"
          description: "App container {{ $labels.name }} memory > 80% of 512M limit"

      # Any college container down (app, postgres, or pgbouncer)
      - alert: CollegeContainerDown
        expr: absent(container_last_seen{name=~"(ems-app|postgres|pgbouncer)-.*"})
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Container {{ $labels.name }} is down"
          description: "A college container has been down for 2 minutes"

      # PgBouncer container down
      - alert: PgBouncerDown
        expr: absent(container_last_seen{name=~"pgbouncer-.*"})
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PgBouncer {{ $labels.name }} is down"
          description: "A college's PgBouncer container has been down for 1 minute"

  - name: ems-app-alerts
    rules:
      # App /metrics scrape failing (app unreachable or /metrics down)
      - alert: AppMetricsDown
        expr: up{job=~"ems-app-.*"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "App metrics scrape failed for {{ $labels.job }}"
          description: "Prometheus could not scrape /metrics from the app container for 2 minutes."

      # Laravel app reports DB disconnected
      - alert: AppDBDisconnected
        expr: ems_db_connected == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "App DB disconnected (college_id {{ $labels.college_id }})"
          description: "Laravel reports database connection down for 2 minutes."

  - name: ems-host-alerts
    rules:
      # Total VPS CPU overload (all containers combined)
      - alert: HostCPUOverload
        expr: sum(rate(container_cpu_usage_seconds_total{name=~"(ems-|postgres-|pgbouncer-).*"}[5m])) > 3.0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "VPS CPU overloaded"
          description: "Total container CPU > 3 cores. Consider removing colleges or upgrading VPS."

      # Total VPS memory overload
      - alert: HostMemoryOverload
        expr: sum(container_memory_usage_bytes{name=~"(ems-|postgres-|pgbouncer-).*"}) > 3500000000
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "VPS memory overloaded"
          description: "Total container memory > 3.5GB. Risk of OOM."
