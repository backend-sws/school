global:
  scrape_interval: 30s
  evaluation_interval: 30s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['ems-alertmanager:9093']

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # cAdvisor - per-container CPU/RAM/Network/Disk metrics
  # Tracks ALL containers: postgres-*, pgbouncer-*, ems-app-*
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['ems-cadvisor:8080']

  # --- Per-college app containers ---
  - job_name: 'ems-app-ptjmrajgir'
    metrics_path: /metrics
    static_configs:
      - targets: ['ems-app-ptjmrajgir:80']
        labels:
          college: 'ptjmrajgir'

  # --- Per-college postgres (basic pg_stat via cAdvisor is enough) ---
  # If deeper DB metrics are needed, add per-college postgres-exporter:
  # - job_name: 'postgres-ptjmrajgir'
  #   static_configs:
  #     - targets: ['postgres-exporter-ptjmrajgir:9187']
  #       labels:
  #         college: 'ptjmrajgir'

  # Future: add more college scrape targets here
  # - job_name: 'ems-app-collegeb'
  #   metrics_path: /metrics
  #   static_configs:
  #     - targets: ['ems-app-collegeb:80']
  #       labels:
  #         college: 'collegeb'
