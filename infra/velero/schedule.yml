# Velero Backup Schedules for Education Management System
#
# This manifest creates:
# 1. Daily backup schedule - runs at 3 AM UTC, 7 days retention
# 2. Weekly backup schedule - runs Sunday at 4 AM UTC, 30 days retention
#
# Storage Backend: Cloudflare R2
#
# Prerequisites:
# - Velero must be installed (run install.sh first)
#
# Apply with:
#   kubectl apply -f schedule.yml
#
# Verify with:
#   velero schedule get
#   velero backup get
#
---
# Daily full backup of education-management namespace
apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: cms-daily-backup
  namespace: velero
  labels:
    app: education-management
    backup-type: daily
spec:
  # Run daily at 3 AM UTC
  schedule: "0 3 * * *"
  # Don't use owner references (allows cross-namespace restore)
  useOwnerReferencesInBackup: false
  template:
    # Include only the education-management namespace
    includedNamespaces:
      - education-management
    # Backup all resources
    includedResources:
      - '*'
    # Exclude noisy resources
    excludedResources:
      - events
      - events.events.k8s.io
    # Use default backup storage location
    storageLocation: default
    # Retention: 7 days for daily backups
    ttl: 168h
    # Include volume snapshots
    snapshotVolumes: true
    # Use file-system backup for PVCs (works with any storage)
    defaultVolumesToFsBackup: true
    # Metadata
    metadata:
      labels:
        backup-type: daily
        app: education-management
---
# Weekly backup with longer retention
apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: cms-weekly-backup
  namespace: velero
  labels:
    app: education-management
    backup-type: weekly
spec:
  # Run weekly on Sunday at 4 AM UTC
  schedule: "0 4 * * 0"
  useOwnerReferencesInBackup: false
  template:
    includedNamespaces:
      - education-management
    includedResources:
      - '*'
    excludedResources:
      - events
      - events.events.k8s.io
    storageLocation: default
    # Retention: 30 days for weekly backups
    ttl: 720h
    snapshotVolumes: true
    defaultVolumesToFsBackup: true
    metadata:
      labels:
        backup-type: weekly
        app: education-management
---
