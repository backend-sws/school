name: rishividya

# Default ports (override in .env to avoid "proxy already running" / port conflicts):
#   APP_PORT=18088, POSTGRES_HOST_PORT=15432, ADMINER_PORT=18090, VITE_PORT=15173
x-php-alpine-build-args: &php-alpine-build-args
  ALPINE_MIRROR: ${DOCKER_ALPINE_MIRROR:-dl-cdn.alpinelinux.org}
  SKIP_FRONTEND_BUILD: ${SKIP_FRONTEND_BUILD:-true}

services:
  # ==========================================================================
  # Laravel PHP-FPM Application
  # ==========================================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
      args:
        <<: *php-alpine-build-args
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./storage:/var/www/html/storage
      - ./public:/var/www/html/public
      - ./app:/var/www/html/app
      - ./routes:/var/www/html/routes
      - ./database:/var/www/html/database
      - ./resources/views:/var/www/html/resources/views
      - ./config:/var/www/html/config
      - ./docs:/var/www/html/docs
    env_file: .env
    # Inside containers, Postgres listens on 5432 (not 54320)
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-rishividya}
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - VITE_DEV_SERVER_URL=http://localhost:${VITE_PORT:-15173}
      - INSTITUTIONS_CONFIG_PATH=/var/www/html/storage/app/institutions-config.local.json
      - REVERB_HOST=reverb
      - REVERB_PORT=8080
      - QUEUE_CONNECTION=${QUEUE_CONNECTION:-redis}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      reverb:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "php -r \"exit(@fsockopen('127.0.0.1', 9000) ? 0 : 1);\""]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 40s
    networks:
      - rishividya-network-local
    # Entrypoint runs migrate; CMD from Dockerfile keeps php-fpm running so Nginx can reach it.

  # ==========================================================================
  # Laravel Reverb (WebSocket server for real-time notifications)
  # ==========================================================================
  reverb:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
      args:
        <<: *php-alpine-build-args
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./storage:/var/www/html/storage
      - ./config:/var/www/html/config
    env_file: .env
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-rishividya}
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REVERB_SERVER_HOST=0.0.0.0
      - REVERB_SERVER_PORT=8080
    depends_on:
      postgres:
        condition: service_healthy
    command: php artisan reverb:start
    ports:
      - "${REVERB_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "php -r \"exit(@fsockopen('127.0.0.1', 8080) ? 0 : 1);\""]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - rishividya-network-local

  # ==========================================================================
  # Vite Dev Server (Hot Reload)
  # ==========================================================================
  vite:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./package.json:/app/package.json
      - ./package-lock.json:/app/package-lock.json
      - ./vite.config.ts:/app/vite.config.ts
      - ./tsconfig.json:/app/tsconfig.json
      - ./components.json:/app/components.json
      - ./resources:/app/resources
      - ./public:/app/public
      - vite_node_modules:/app/node_modules
    ports:
      - "${VITE_PORT:-15173}:${VITE_PORT:-15173}"
    env_file: .env
    environment:
      - SKIP_WAYFINDER=true
      - CHOKIDAR_USEPOLLING=true
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks:
      - rishividya-network-local

  # ==========================================================================
  # Nginx Web Server
  # ==========================================================================
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${APP_PORT:-18088}:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/var/www/html/public:ro
      - ./storage/app/public:/var/www/html/storage/app/public:ro
    depends_on:
      app:
        condition: service_healthy
      vite:
        condition: service_started
    networks:
      - rishividya-network-local

  # ==========================================================================
  # PostgreSQL Database
  # ==========================================================================
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      # Host port (default 15432) -> Container 5432
      - "${POSTGRES_HOST_PORT:-15432}:5432"
    env_file: .env
    environment:
      - POSTGRES_DB=${DB_DATABASE:-rishividya}
      - POSTGRES_USER=${DB_USERNAME:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init-create-test-db.sh:/docker-entrypoint-initdb.d/02-create-test-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-rishividya}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - rishividya-network-local

  # ==========================================================================
  # Test runner (PHPUnit). Same Postgres server, DB_DATABASE=test_db. Migrate, seed, test.
  # Run with: docker compose run --rm test
  # ==========================================================================
  test:
    build:
      context: .
      dockerfile: Dockerfile.test
      args:
        <<: *php-alpine-build-args
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    env_file: .env
    environment:
      - APP_ENV=testing
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=test_db
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - CACHE_STORE=array
      - SESSION_DRIVER=array
      - QUEUE_CONNECTION=sync
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "
      composer install &&
      php artisan config:clear &&
      (PGPASSWORD=$$DB_PASSWORD psql -h postgres -U $$DB_USERNAME -d postgres -tc \"SELECT 1 FROM pg_database WHERE datname='test_db'\" | grep -q 1 ||
       PGPASSWORD=$$DB_PASSWORD psql -h postgres -U $$DB_USERNAME -d postgres -c 'CREATE DATABASE test_db;') &&
      php artisan migrate:fresh --seed --force &&
      php artisan test
      "
    restart: "no"
    networks:
      - rishividya-network-local

  # ==========================================================================
  # Adminer - Database Management GUI
  # ==========================================================================
  adminer:
    image: adminer:latest
    restart: unless-stopped
    ports:
      - "${ADMINER_PORT:-18090}:8080"
    depends_on:
      - postgres
    networks:
      - rishividya-network-local

  # ========================================================================
  # Developer Docs (standalone nginx with basic auth)
  # ========================================================================
  docs-server:
    build:
      context: ./infra/docs-server
      args:
        DOCS_USER: ${DOCS_USER:-developer}
        DOCS_PASS: ${DOCS_PASS:-docs@rishividya.tech}
    restart: unless-stopped
    ports:
      - "${DOCS_PORT:-18091}:80"
    volumes:
      - ./docs:/usr/share/nginx/html:ro
    networks:
      - rishividya-network-local

  # ==========================================================================
  # Redis (Queue + Cache backend)
  # ==========================================================================
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-16379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - rishividya-network-local

  # ==========================================================================
  # Laravel Horizon (Queue Worker — builds from Dockerfile.horizon locally)
  # ==========================================================================
  horizon:
    build:
      context: .
      dockerfile: Dockerfile.horizon
      args:
        <<: *php-alpine-build-args
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./app:/var/www/html/app
      - ./config:/var/www/html/config
      - ./database:/var/www/html/database
      - ./routes:/var/www/html/routes
      - ./storage:/var/www/html/storage
      - ./docker/horizon-dev-opcache.ini:/usr/local/etc/php/conf.d/zzz-dev-opcache.ini:ro
    env_file: .env
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-rishividya}
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - QUEUE_CONNECTION=redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REVERB_HOST=reverb
      - REVERB_PORT=8080
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - rishividya-network-local

# ==========================================================================
# Networks (simple key for podman-compose compatibility)
# ==========================================================================
networks:
  rishividya-network-local:
    driver: bridge

# ==========================================================================
# Volumes
# ==========================================================================
volumes:
  postgres_data:
    driver: local
  vite_node_modules:
    driver: local
  redis_data:
    driver: local

